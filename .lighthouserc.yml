ci:
  collect:
    staticDistDir: .
    urls:
      - /index.html
      - /scenarios/images/bad.html
      - /scenarios/images/good.html
      - /scenarios/javascript/bad.html
      - /scenarios/javascript/good.html
      - /scenarios/css/bad.html
      - /scenarios/css/good.html
      - /scenarios/fonts/bad.html
      - /scenarios/fonts/good.html
      - /scenarios/layout-stability/bad.html
      - /scenarios/layout-stability/good.html
      - /scenarios/network/bad.html
      - /scenarios/network/good.html
      - /scenarios/caching/bad.html
      - /scenarios/caching/good.html
      - /scenarios/third-party/bad.html
      - /scenarios/third-party/good.html
    numberOfRuns: 1
  assert:
    preset: lighthouse:no-pwa
    assertions:
      categories:performance:
        - warn
        - minScore: 0.5
          aggregationMethod: median-run
  upload:
    target: temporary-public-storage
